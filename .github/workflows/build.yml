name: Build Cross-Platform Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build macOS App
      run: |
        python build_app.py
        
    - name: Check build logs and output
      run: |
        echo "Listing root directory:"
        ls -la
        echo "Listing build directory (if exists):"
        ls -la build/ || true
        
    - name: Create DMG or Zip
      run: |
        echo "Listing dist directory contents:"
        ls -la dist/
        cd dist
        # Just zip everything inside dist to be safe
        zip -r HeadphoneTestApp_macOS.zip .
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MacOS-App
        path: dist/HeadphoneTestApp_macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build Windows Exe
      run: |
        python build_app.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App
        path: dist/HeadphoneTestApp.exe
